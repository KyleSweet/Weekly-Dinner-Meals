<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weekly Dinner Meals</title>
  <style>
    :root {
      --bg: #121212;
      --card-bg: #1e1e1e;
      --accent: #4f46e5;
      --accent-hover: #4338ca;
      --text: #f3f4f6;
      --text-muted: #9ca3af;
      --border: #374151;
      --eat-out: #f59e0b;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 600px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    header {
      text-align: center;
    }

    header h1 {
      font-size: 1.75rem;
      margin-bottom: 0.5rem;
    }

    header p {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 1rem;
    }

    button {
      background-color: var(--accent);
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
    }

    button:hover:not(:disabled) {
      background-color: var(--accent-hover);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .days-grid {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .day-card {
      background-color: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      padding: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: border-color 0.2s;
    }

    .day-card.eat-out {
      border-color: var(--eat-out);
    }

    .day-name {
      font-weight: 600;
      width: 100px;
    }

    .meal-title {
      flex: 1;
      font-size: 1.05rem;
      color: #e5e7eb;
    }

    .eat-out-btn {
      background-color: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 0.4rem 0.8rem;
      font-size: 0.8rem;
    }

    .day-card.eat-out .eat-out-btn {
      background-color: var(--eat-out);
      color: #000;
      border-color: var(--eat-out);
      font-weight: 600;
    }

    .history-section {
      margin-top: 1rem;
      background-color: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      padding: 1rem;
    }

    .history-section h2 {
      font-size: 1rem;
      margin-bottom: 0.5rem;
      color: var(--text-muted);
    }

    .history-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .tag {
      background-color: #2b2d42;
      border: 1px solid var(--border);
      font-size: 0.8rem;
      padding: 0.25rem 0.5rem;
      border-radius: 0.25rem;
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>Weekly Dinner Meals</h1>
    <p>Toggle "Eat Out" on any day before spinning to lock that day in.</p>
  </header>

  <div class="controls">
    <button id="spinBtn" onclick="spinNewWeek()">Spin New Week</button>
  </div>

  <div class="days-grid" id="scheduleGrid"></div>

  <div class="history-section">
    <h2>Recent Meal History (Excluded from Spin)</h2>
    <div class="history-tags" id="historyTags"></div>
  </div>
</div>

<script>
  // Master database of meals
  const masterMealList = [
    "Tacos", "Spaghetti Bolognese", "Chicken Curry", "Homemade Pizza",
    "Grilled Salmon", "Stir Fry Noodles", "Burgers", "Steak & Veggies",
    "Chili Con Carne", "Chicken Fajitas", "Baked Ziti", "Pork Chops",
    "Shepherd's Pie", "Risotto"
  ];

  const daysOfWeek = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];

  // State
  let history = ["Tacos", "Spaghetti Bolognese", "Chicken Curry"]; // Seeded with recent history
  let currentSchedule = daysOfWeek.map(day => ({
    dayName: day,
    meal: "Click Spin",
    isEatOut: false
  }));
  let isSpinning = false;

  // Initialize UI
  document.addEventListener("DOMContentLoaded", () => {
    renderSchedule();
    renderHistory();
  });

  function toggleEatOut(index) {
    if (isSpinning) return;
    
    currentSchedule[index].isEatOut = !currentSchedule[index].isEatOut;
    currentSchedule[index].meal = currentSchedule[index].isEatOut ? "Eat Out" : "Pending Spin...";
    
    renderSchedule();
  }

  function spinNewWeek() {
    if (isSpinning) return;

    const spinBtn = document.getElementById("spinBtn");
    isSpinning = true;
    spinBtn.disabled = true;

    // Filter available meals using master list minus history
    let availablePool = masterMealList.filter(meal => !history.includes(meal));

    // Fallback if history consumed too many options
    if (availablePool.length < 7) {
      availablePool = [...masterMealList];
    }

    let iterations = 0;
    const maxIterations = 15; // Animation steps

    const spinInterval = setInterval(() => {
      currentSchedule.forEach((daySlot) => {
        if (!daySlot.isEatOut) {
          const randomIndex = Math.floor(Math.random() * availablePool.length);
          daySlot.meal = availablePool[randomIndex];
        }
      });
      renderSchedule();

      iterations++;
      if (iterations >= maxIterations) {
        clearInterval(spinInterval);
        finalizeWeek(availablePool);
      }
    }, 100);
  }

  function finalizeWeek(availablePool) {
    let poolCopy = [...availablePool];
    const newMealsEaten = [];

    currentSchedule.forEach((daySlot) => {
      if (daySlot.isEatOut) {
        daySlot.meal = "Eat Out";
      } else {
        if (poolCopy.length === 0) poolCopy = [...masterMealList];
        
        const randomIndex = Math.floor(Math.random() * poolCopy.length);
        const selectedMeal = poolCopy.splice(randomIndex, 1)[0];
        
        daySlot.meal = selectedMeal;
        newMealsEaten.push(selectedMeal);
      }
    });

    // Update history only with actual meals cooked (excluding "Eat Out")
    history = [...newSetHistory(history, newMealsEaten)];

    // Reset controls so you can spin again immediately without refreshing
    isSpinning = false;
    document.getElementById("spinBtn").disabled = false;

    renderSchedule();
    renderHistory();
  }

  function newSetHistory(oldHistory, newMeals) {
    // Keep max 7 items in history buffer
    const combined = [...oldHistory, ...newMeals];
    return combined.slice(-7);
  }

  function renderSchedule() {
    const grid = document.getElementById("scheduleGrid");
    grid.innerHTML = "";

    currentSchedule.forEach((item, index) => {
      const card = document.createElement("div");
      card.className = `day-card ${item.isEatOut ? 'eat-out' : ''}`;

      card.innerHTML = `
        <span class="day-name">${item.dayName}</span>
        <span class="meal-title">${item.meal}</span>
        <button class="eat-out-btn" onclick="toggleEatOut(${index})">
          ${item.isEatOut ? 'Eating Out' : 'Mark Eat Out'}
        </button>
      `;

      grid.appendChild(card);
    });
  }

  function renderHistory() {
    const historyContainer = document.getElementById("historyTags");
    historyContainer.innerHTML = "";

    if (history.length === 0) {
      historyContainer.innerHTML = `<span style="color: var(--text-muted); font-size: 0.8rem;">No recent history</span>`;
      return;
    }

    history.forEach(meal => {
      const tag = document.createElement("span");
      tag.className = "tag";
      tag.textContent = meal;
      historyContainer.appendChild(tag);
    });
  }
</script>

</body>
</html>
