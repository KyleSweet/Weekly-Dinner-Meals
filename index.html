<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Dinner Spinner</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { margin-bottom: 20px; color: var(--primary); text-align: center; }

        .container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            max-width: 1100px;
            width: 100%;
        }

        @media (min-width: 768px) {
            .container { grid-template-columns: 1.2fr 1.1fr 1fr; }
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        /* Week Planner Styles */
        .day-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }
        .day-name { font-weight: 600; width: 100px; }
        .meal-assigned { flex-grow: 1; margin: 0 15px; color: #64748b; font-weight: 500; }
        .eat-out-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .eat-out-btn.blocked { background: #94a3b8; }

        /* Controls */
        .actions {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 1100px;
        }
        button.main-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 24px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            flex-grow: 1;
        }
        button.main-btn:hover { background: var(--primary-hover); }
        button:disabled { opacity: 0.5; cursor: not-allowed !important; }

        /* Wheel Graphic UI */
        .wheel-interface {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }
        #wheelWrapper {
            position: relative;
            width: 260px;
            height: 260px;
            margin-top: 10px;
        }
        #wheelCanvas {
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            background: #cbd5e1;
        }
        .pointer {
            position: absolute;
            top: -12px;
            left: calc(50% - 15px);
            width: 0; 
            height: 0; 
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 25px solid #1e293b;
            z-index: 10;
        }
        #statusDisplay {
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 5px;
            color: var(--primary);
        }
        #liveSelection {
            font-size: 1.1rem;
            font-weight: 700;
            background: #f1f5f9;
            padding: 10px;
            width: 90%;
            text-align: center;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid var(--border);
            min-height: 24px;
            color: #334155;
        }

        /* Meal Manager */
        .meal-input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }
        input[type="text"] {
            flex-grow: 1;
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
        }
        .add-btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
        }
        .meal-list {
            max-height: 400px;
            overflow-y: auto;
            font-size: 0.9rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 5px;
        }
        .meal-item {
            display: flex;
            justify-content: space-between;
            padding: 6px;
            border-bottom: 1px solid var(--border);
        }
        .delete-meal {
            color: #ef4444;
            cursor: pointer;
            background: none;
            border: none;
        }
    </style>
</head>
<body>

    <h1>Weekly Dinner Wheel Spinner</h1>

    <div class="actions">
        <button class="main-btn" id="spinBtn" onclick="spinTheWeek()">🎲 Spin the Week!</button>
        <button class="main-btn" style="background:#64748b;" onclick="clearWeek()">Reset Week</button>
    </div>

    <div class="container">
        <!-- Main Weekly Planner -->
        <div class="card">
            <h3>Your Week</h3>
            <div id="weekPlanner"></div>
        </div>

        <!-- Wheel Visualizer -->
        <div class="card wheel-interface">
            <div id="statusDisplay">Ready to spin!</div>
            <div id="liveSelection">- - -</div>
            <div id="wheelWrapper">
                <div class="pointer"></div>
                <canvas id="wheelCanvas" width="260" height="260"></canvas>
            </div>
        </div>

        <!-- Meal List Manager -->
        <div class="card">
            <h3>Manage Meals (<span id="mealCount">0</span>)</h3>
            <div class="meal-input-group">
                <input type="text" id="newMealInput" placeholder="Add a dinner choice...">
                <button class="add-btn" onclick="addCustomMeal()">Add</button>
            </div>
            <div class="meal-list" id="mealListContainer"></div>
        </div>
    </div>

    <script>
        const defaultMeals = [
            "Tacos", "Spaghetti Bolognese", "Homemade Pizza", "Chicken Stir Fry", 
            "Beef & Broccoli", "Roast Chicken", "Salmon & Asparagus", "Chili Con Carne",
            "Pulled Pork Sandwiches", "Chicken Caesar Salad", "Burgers & Fries", "Butter Chicken",
            "Lasagna", "Mac & Cheese", "Steak & Mashed Potatoes", "Pesto Pasta",
            "Fajitas", "Shepherd's Pie", "Chicken Parm", "Quesadillas",
            "Sausage & Peppers", "Fish Tacos", "Meatloaf", "Greek Salad",
            "Enchiladas", "Baked Ziti", "Fried Rice", "Grilled Cheese & Soup",
            "BBQ Ribs", "Shrimp Scampi", "Chicken Alfredo", "Beef Stew",
            "Stuffed Peppers", "Pork Chops", "Sloppy Joes", "Ramen Bowls"
        ];

        const days = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];
        
        let meals = JSON.parse(localStorage.getItem('dinnerMeals')) || defaultMeals;
        let schedule = JSON.parse(localStorage.getItem('dinnerSchedule')) || {};
        let blockedDays = JSON.parse(localStorage.getItem('dinnerBlockedDays')) || [];

        let currentAngle = 0;
        let isSpinning = false;
        const colors = ["#f87171", "#fb923c", "#fbbf24", "#34d399", "#22d3ee", "#60a5fa", "#818cf8", "#c084fc", "#f472b6"];

        function init() {
            if(!localStorage.getItem('dinnerMeals')) {
                localStorage.setItem('dinnerMeals', JSON.stringify(meals));
            }
            renderWeek();
            renderMealList();
            drawWheel();
        }

        function renderWeek() {
            const planner = document.getElementById('weekPlanner');
            if(!planner) return;
            planner.innerHTML = '';

            days.forEach(day => {
                const isBlocked = blockedDays.includes(day);
                let currentMeal = schedule[day] || "Waiting for spin...";
                if (isBlocked) currentMeal = "🚫 Eating Out";

                const row = document.createElement('div');
                row.className = 'day-row';
                row.innerHTML = `
                    <div class="day-name">${day}</div>
                    <div class="meal-assigned" style="${isBlocked ? 'color: #ef4444; font-style: italic;' : schedule[day] ? 'color: #1e293b;' : 'color: #94a3b8;'}">${currentMeal}</div>
                    <button class="eat-out-btn ${isBlocked ? 'blocked' : ''}" ${isSpinning ? 'disabled' : ''} onclick="toggleBlockDay('${day}')">
                        ${isBlocked ? 'Unblock' : 'Eat Out'}
                    </button>
                `;
                planner.appendChild(row);
            });
        }

        function renderMealList() {
            const countEl = document.getElementById('mealCount');
            const container = document.getElementById('mealListContainer');
            if(!container || !countEl) return;

            countEl.innerText = meals.length;
            container.innerHTML = '';
            
            meals.forEach((meal, index) => {
                const item = document.createElement('div');
                item.className = 'meal-item';
                item.innerHTML = `
                    <span>${meal}</span>
                    <button class="delete-meal" ${isSpinning ? 'disabled' : ''} onclick="deleteMeal(${index})">✕</button>
                `;
                container.appendChild(item);
            });
        }

        function drawWheel() {
            const canvas = document.getElementById('wheelCanvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            if (!ctx) return;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const segments = 12;
            const arcSize = (2 * Math.PI) / segments;

            for (let i = 0; i < segments; i++) {
                const angle = currentAngle + (i * arcSize);
                ctx.fillStyle = colors[i % colors.length];
                ctx.beginPath();
                ctx.moveTo(130, 130);
                ctx.arc(130, 130, 120, angle, angle + arcSize);
                ctx.lineTo(130, 130);
                ctx.fill();
                ctx.strokeStyle = "#ffffff";
                ctx.lineWidth = 2;
                ctx.stroke();
            }

            // Center Pin
            ctx.beginPath();
            ctx.arc(130, 130, 15, 0, 2 * Math.PI);
            ctx.fillStyle = "#1e293b";
            ctx.fill();
        }

        function toggleBlockDay(day) {
            if (blockedDays.includes(day)) {
                blockedDays = blockedDays.filter(d => d !== day);
            } else {
                blockedDays.push(day);
                delete schedule[day];
            }
            localStorage.setItem('dinnerBlockedDays', JSON.stringify(blockedDays));
            localStorage.setItem('dinnerSchedule', JSON.stringify(schedule));
            renderWeek();
        }

        function addCustomMeal() {
            const input = document.getElementById('newMealInput');
            if(!input) return;
            const newMeal = input.value.trim();
            if (newMeal && !meals.includes(newMeal)) {
                meals.push(newMeal);
                localStorage.setItem('dinnerMeals', JSON.stringify(meals));
                input.value = '';
                renderMealList();
            }
        }

        function deleteMeal(index) {
            meals.splice(index, 1);
            localStorage.setItem('dinnerMeals', JSON.stringify(meals));
            renderMealList();
        }

        async function spinTheWeek() {
            const openDays = days.filter(day => !blockedDays.includes(day));
            if (meals.length < openDays.length) {
                alert("Please make sure you have more meals in your list than empty days left!");
                return;
            }

            isSpinning = true;
            document.getElementById('spinBtn').disabled = true;
            let localPool = [...meals];

            for (let i = 0; i < openDays.length; i++) {
                const currentDay = openDays[i];
                document.getElementById('statusDisplay').innerText = `Spinning for ${currentDay}...`;
                
                const selectedMeal = await animateSingleSpin(localPool);
                
                schedule[currentDay] = selectedMeal;
                localStorage.setItem('dinnerSchedule', JSON.stringify(schedule));
                renderWeek();

                localPool = localPool.filter(m => m !== selectedMeal);
                await new Promise(resolve => setTimeout(resolve, 600));
            }

            document.getElementById('statusDisplay').innerText = "🎉 Week Complete!";
            document.getElementById('liveSelection').innerText = "All set!";
            isSpinning = false;
            document.getElementById('spinBtn').disabled = false;
        }

        function animateSingleSpin(currentPool) {
            return new Promise((resolve) => {
                const spinDuration = 1500; 
                const startTime = performance.now();
                
                const winningIndex = Math.floor(Math.random() * currentPool.length);
                const targetRotation = (Math.random() * 4 + 4) * Math.PI; 
                const startAngle = currentAngle;

                function updateAnimation(now) {
                    const elapsed = now - startTime;
                    const progress = Math.min(elapsed / spinDuration, 1);
                    const easeOut = 1 - Math.pow(1 - progress, 3);
                    
                    currentAngle = startAngle + targetRotation * easeOut;
                    drawWheel();

                    if (progress < 1) {
                        const pseudoIndex = Math.floor(Math.random() * currentPool.length);
                        document.getElementById('liveSelection').innerText = `🎰 ${currentPool[pseudoIndex]}`;
                        requestAnimationFrame(updateAnimation);
                    } else {
                        const finalSelection = currentPool[winningIndex];
                        document.getElementById('liveSelection').innerText = `✅ ${finalSelection}!`;
                        resolve(finalSelection);
                    }
                }
                requestAnimationFrame(updateAnimation);
            });
        }

        function clearWeek() {
            if (isSpinning) return;
            schedule = {};
            localStorage.removeItem('dinnerSchedule');
            document.getElementById('statusDisplay').innerText = 'Ready to spin!';
            document.getElementById('liveSelection').innerText = '- - -';
            renderWeek();
            currentAngle = 0;
            drawWheel();
        }

        // Safeguard initialization
        if (document.readyState === "complete" || document.readyState === "interactive") {
            init();
        } else {
            window.addEventListener('DOMContentLoaded', init);
        }
    </script>
</body>
</html>
