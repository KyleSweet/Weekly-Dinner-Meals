<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Dinner Spinner</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { margin-bottom: 20px; color: var(--primary); text-align: center; }

        .container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            max-width: 1100px;
            width: 100%;
        }

        @media (min-width: 768px) {
            .container { grid-template-columns: 2fr 1fr; }
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .card-header h3 { margin: 0; }

        .save-history-btn {
            background: #0284c7;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .save-history-btn:hover { background: #0369a1; }

        /* Week Planner Styles */
        .day-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 0;
            border-bottom: 1px solid var(--border);
            gap: 10px;
        }
        .day-name { font-weight: 600; width: 100px; }
        .meal-assigned { flex-grow: 1; margin: 0 5px; color: #64748b; font-weight: 500; font-size: 1.05rem; }
        
        .action-btns {
            display: flex;
            gap: 8px;
        }
        
        .eat-out-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .eat-out-btn.blocked { background: #64748b; }
        
        .reroll-btn {
            background: #f59e0b;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .reroll-btn:hover { background: #d97706; }

        .override-btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .override-btn:hover { background: #2563eb; }

        /* Controls */
        .actions {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 1100px;
        }
        button.main-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 24px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            flex-grow: 1;
        }
        button.main-btn:hover { background: var(--primary-hover); }
        button:disabled { opacity: 0.5; cursor: not-allowed !important; }

        /* Meal Manager */
        .meal-input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }
        input[type="text"], select {
            flex-grow: 1;
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.95rem;
        }
        .add-btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
        }
        .meal-list {
            max-height: 380px;
            overflow-y: auto;
            font-size: 0.9rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 5px;
        }
        .meal-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            border-bottom: 1px solid var(--border);
        }
        .meal-text {
            cursor: pointer;
            flex-grow: 1;
            padding: 2px 4px;
            border-radius: 4px;
            transition: background 0.2s;
        }
        .meal-text:hover {
            background: #f1f5f9;
            color: var(--primary);
        }
        .meal-text::after {
            content: " ✏️";
            font-size: 0.75rem;
            opacity: 0.4;
        }
        .delete-meal {
            color: #ef4444;
            cursor: pointer;
            background: none;
            border: none;
            font-weight: bold;
        }

        /* History Banner & Toggle */
        .history-box {
            margin-top: 15px;
            padding: 12px;
            background: #f1f5f9;
            border-radius: 8px;
            font-size: 0.85rem;
            color: #475569;
        }
        .toggle-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid #cbd5e1;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 38px;
            height: 20px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #cbd5e1;
            transition: .3s;
            border-radius: 20px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(18px); }

        .history-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 5px;
        }
        .tag {
            background: #e2e8f0;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.75rem;
        }

        /* Modal Screens */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 95%;
            max-width: 520px;
            position: relative;
        }

        #modalStatus {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 10px;
            text-align: center;
        }

        #modalLiveSelection {
            font-size: 1.3rem;
            font-weight: 700;
            background: #f1f5f9;
            padding: 12px;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 2px solid var(--border);
            min-height: 30px;
            color: #334155;
        }

        .wheel-container {
            position: relative;
            width: 460px;
            height: 460px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #wheelCanvas {
            border-radius: 50%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .wheel-pointer {
            position: absolute;
            top: -15px;
            left: calc(50% - 15px);
            width: 0; 
            height: 0; 
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #1e293b;
            z-index: 1100;
            filter: drop-shadow(0px 4px 4px rgba(0,0,0,0.2));
        }

        .select-modal-box {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }

        .modal-btn-row {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>Weekly Dinner Wheel Spinner</h1>

    <div class="actions">
        <button class="main-btn" id="spinBtn" onclick="spinTheWeek()">🎲 Spin the Week!</button>
        <button class="main-btn" style="background:#64748b;" onclick="clearWeek()">Reset Week</button>
    </div>

    <div class="container">
        <!-- Main Weekly Planner -->
        <div class="card">
            <div class="card-header">
                <h3>Your Week Layout</h3>
                <button class="save-history-btn" onclick="saveCurrentWeekToHistory()">💾 Save Week to History</button>
            </div>
            <div id="weekPlanner"></div>
        </div>

        <!-- Meal List Manager -->
        <div class="card">
            <h3>Manage Meals (<span id="mealCount">0</span>)</h3>
            <p style="font-size: 0.8rem; color:#64748b; margin-top:-10px;">Click any meal name to edit typos.</p>
            <div class="meal-input-group">
                <input type="text" id="newMealInput" placeholder="Add a dinner choice...">
                <button class="add-btn" onclick="addCustomMeal()">Add</button>
            </div>
            <div class="meal-list" id="mealListContainer"></div>

            <!-- Resting / History Box -->
            <div class="history-box">
                <div class="toggle-row">
                    <strong>Prevent repeats from history?</strong>
                    <label class="switch">
                        <input type="checkbox" id="preventRepeatsToggle" onchange="togglePreventRepeats()">
                        <span class="slider"></span>
                    </label>
                </div>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span>Resting (<span id="historyCount">0</span>):</span>
                    <button style="border:none; background:none; color:#ef4444; font-size:0.75rem; cursor:pointer;" onclick="clearHistory()">Clear History</button>
                </div>
                <div class="history-tags" id="historyTags"></div>
            </div>
        </div>
    </div>

    <!-- The Giant Pop-up Wheel Screen -->
    <div class="modal-overlay" id="wheelModal">
        <div class="modal-content">
            <div id="modalStatus">Spinning...</div>
            <div id="modalLiveSelection">- - -</div>
            <div class="wheel-container">
                <div class="wheel-pointer"></div>
                <canvas id="wheelCanvas" width="460" height="460"></canvas>
            </div>
        </div>
    </div>

    <!-- Dropdown Edit Modal -->
    <div class="modal-overlay" id="editModal">
        <div class="modal-content" style="max-width: 400px;">
            <h3 id="editModalTitle" style="margin-top:0; color:var(--primary);">Select Meal</h3>
            <div class="select-modal-box">
                <select id="mealDropdownSelect"></select>
                <div class="modal-btn-row">
                    <button class="main-btn" onclick="saveDropdownSelection()">Save Choice</button>
                    <button class="main-btn" style="background:#64748b;" onclick="closeEditModal()">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const defaultMeals = [
            "Sesame Chicken", "Carbonara", "Tacos", "Beef Short Ribs", "Breakfast", 
            "Spaghetti & Meatballs", "Sausage & Peppers", "Hamburgers", "Chicken Caesar Salad", 
            "Fried Chicken Sandwich", "Beef Stir Fry", "Butter Chicken", "Meatball Subs", 
            "Fajitas", "Quesadilla", "Grilled Cheese Sandwich", "Pulled Pork", "Poutine", 
            "Greek", "Bolognese", "Beef & Broccoli", "Sausage on a Bun", "Chili", 
            "Perogies", "Chicken Stir Fry", "Chicken Fried Rice", "Mac & Cheese", "Stew", 
            "Ham", "Chicken Wings", "Pork Tenderloin", "Chicken Parm", "Sloppy Joe", 
            "Chicken Tenders", "Chicken Teriyaki", "Burritos", "Chicken & Dumplings", 
            "Shrimp & Grits", "Tri Tip Sandwich", "Chicken Dumplets", "Turkey Breast"
        ];

        const days = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];
        
        let meals = JSON.parse(localStorage.getItem('dinnerMeals')) || defaultMeals;
        let schedule = JSON.parse(localStorage.getItem('dinnerSchedule')) || {};
        let previousWeekMeals = JSON.parse(localStorage.getItem('dinnerPreviousWeek')) || [];
        let blockedDays = JSON.parse(localStorage.getItem('dinnerBlockedDays')) || [];
        let preventRepeats = JSON.parse(localStorage.getItem('dinnerPreventRepeats')) ?? true;

        let currentAngle = 0;
        let isSpinning = false;
        let activeEditingDay = null;
        
        const colors = [
            "#f87171", "#fb923c", "#fbbf24", "#34d399", "#22d3ee", "#60a5fa", 
            "#818cf8", "#c084fc", "#f472b6", "#a7f3d0", "#fed7aa", "#c7d2fe",
            "#2dd4bf", "#fb7185", "#38bdf8", "#a3e635", "#f43f5e", "#0284c7"
        ];

        function init() {
            if(!localStorage.getItem('dinnerMeals')) {
                localStorage.setItem('dinnerMeals', JSON.stringify(meals));
            }
            
            const toggleEl = document.getElementById('preventRepeatsToggle');
            if (toggleEl) toggleEl.checked = preventRepeats;

            renderWeek();
            renderMealList();
            renderHistory();
        }

        function togglePreventRepeats() {
            const toggleEl = document.getElementById('preventRepeatsToggle');
            preventRepeats = toggleEl.checked;
            localStorage.setItem('dinnerPreventRepeats', JSON.stringify(preventRepeats));
            renderMealList();
        }

        function saveCurrentWeekToHistory() {
            if (isSpinning) return;
            const activeMeals = Object.values(schedule).filter(m => m && !m.includes("🚫") && m !== "Waiting for spin...");
            
            if (activeMeals.length === 0) {
                alert("No scheduled meals found to save!");
                return;
            }

            previousWeekMeals = activeMeals;
            localStorage.setItem('dinnerPreviousWeek', JSON.stringify(previousWeekMeals));
            renderMealList();
            renderHistory();
            alert("Current week's meals saved to resting history!");
        }

        function renderWeek() {
            const planner = document.getElementById('weekPlanner');
            if(!planner) return;
            planner.innerHTML = '';

            days.forEach(day => {
                const isBlocked = blockedDays.includes(day);
                let currentMeal = schedule[day] || "Waiting for spin...";
                if (isBlocked) currentMeal = "🚫 Eating Out / Blocked";

                const row = document.createElement('div');
                row.className = 'day-row';
                
                let actionButtonsHtml = '';
                if (!isBlocked) {
                    actionButtonsHtml += `<button class="override-btn" ${isSpinning ? 'disabled' : ''} onclick="openDropdownSelectModal('${day}')">✏️ Edit</button> `;
                    if (schedule[day]) {
                        actionButtonsHtml += `<button class="reroll-btn" ${isSpinning ? 'disabled' : ''} onclick="rerollSingleDay('${day}')">🎲 Reroll</button>`;
                    } else {
                        actionButtonsHtml += `<button class="reroll-btn" ${isSpinning ? 'disabled' : ''} onclick="rerollSingleDay('${day}')">🎲 Spin Day</button>`;
                    }
                }

                row.innerHTML = `
                    <div class="day-name">${day}</div>
                    <div class="meal-assigned" style="${isBlocked ? 'color: #ef4444; font-style: italic;' : schedule[day] ? 'color: #1e293b; font-weight:600;' : 'color: #94a3b8;'}">${currentMeal}</div>
                    <div class="action-btns">
                        ${actionButtonsHtml}
                        <button class="eat-out-btn ${isBlocked ? 'blocked' : ''}" ${isSpinning ? 'disabled' : ''} onclick="toggleBlockDay('${day}')">
                            ${isBlocked ? 'Unblock' : 'Eat Out'}
                        </button>
                    </div>
                `;
                planner.appendChild(row);
            });
        }

        function renderMealList() {
            const countEl = document.getElementById('mealCount');
            const container = document.getElementById('mealListContainer');
            if(!container || !countEl) return;

            countEl.innerText = meals.length;
            container.innerHTML = '';
            
            meals.forEach((meal, index) => {
                const isResting = preventRepeats && previousWeekMeals.includes(meal);
                const item = document.createElement('div');
                item.className = 'meal-item';
                item.innerHTML = `
                    <span class="meal-text" onclick="editMealText(${index})">${meal} ${isResting ? '💤' : ''}</span>
                    <button class="delete-meal" ${isSpinning ? 'disabled' : ''} onclick="deleteMeal(${index})">✕</button>
                `;
                container.appendChild(item);
            });
        }

        function renderHistory() {
            const historyCount = document.getElementById('historyCount');
            const historyTags = document.getElementById('historyTags');
            if(!historyCount || !historyTags) return;

            historyCount.innerText = previousWeekMeals.length;
            historyTags.innerHTML = '';

            if (previousWeekMeals.length === 0) {
                historyTags.innerHTML = '<span style="font-style:italic; color:#94a3b8;">None yet</span>';
                return;
            }

            previousWeekMeals.forEach(meal => {
                const tag = document.createElement('span');
                tag.className = 'tag';
                tag.innerText = meal;
                historyTags.appendChild(tag);
            });
        }

        function clearHistory() {
            previousWeekMeals = [];
            localStorage.removeItem('dinnerPreviousWeek');
            renderMealList();
            renderHistory();
        }

        function editMealText(index) {
            if(isSpinning) return;
            const currentName = meals[index];
            const updatedName = prompt(`Edit meal name details:`, currentName);
            
            if(updatedName !== null && updatedName.trim() !== "") {
                const cleanValue = updatedName.trim();
                meals[index] = cleanValue;
                localStorage.setItem('dinnerMeals', JSON.stringify(meals));
                
                for (let day in schedule) {
                    if (schedule[day] === currentName) schedule[day] = cleanValue;
                }
                localStorage.setItem('dinnerSchedule', JSON.stringify(schedule));
                
                previousWeekMeals = previousWeekMeals.map(m => m === currentName ? cleanValue : m);
                localStorage.setItem('dinnerPreviousWeek', JSON.stringify(previousWeekMeals));

                renderMealList();
                renderWeek();
                renderHistory();
            }
        }

        function openDropdownSelectModal(day) {
            if (isSpinning) return;
            activeEditingDay = day;
            
            document.getElementById('editModalTitle').innerText = `Select Dinner for ${day}`;
            const dropdown = document.getElementById('mealDropdownSelect');
            dropdown.innerHTML = '';
            
            meals.forEach(m => {
                const opt = document.createElement('option');
                opt.value = m;
                opt.innerText = m;
                if (schedule[day] === m) opt.selected = true;
                dropdown.appendChild(opt);
            });

            document.getElementById('editModal').style.display = 'flex';
        }

        function closeEditModal() {
            document.getElementById('editModal').style.display = 'none';
            activeEditingDay = null;
        }

        function saveDropdownSelection() {
            if (!activeEditingDay) return;
            const selectedMeal = document.getElementById('mealDropdownSelect').value;
            if (selectedMeal) {
                schedule[activeEditingDay] = selectedMeal;
                localStorage.setItem('dinnerSchedule', JSON.stringify(schedule));
                renderWeek();
            }
            closeEditModal();
        }

        function drawPopUpWheel(visiblePool) {
            const canvas = document.getElementById('wheelCanvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = centerX - 10;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const segments = visiblePool.length; 
            const arcSize = (2 * Math.PI) / segments;

            for (let i = 0; i < segments; i++) {
                const angle = currentAngle + (i * arcSize);
                
                ctx.fillStyle = colors[i % colors.length];
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, angle, angle + arcSize);
                ctx.lineTo(centerX, centerY);
                ctx.fill();
                
                ctx.strokeStyle = "rgba(255,255,255,0.4)";
                ctx.lineWidth = 1;
                ctx.stroke();
            }

            for (let i = 0; i < segments; i++) {
                const angle = currentAngle + (i * arcSize);
                
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(angle + (arcSize / 2));
                
                ctx.textAlign = "right";
                ctx.textBaseline = "middle";
                ctx.fillStyle = "#1e293b";
                
                if (segments > 30) {
                    ctx.font = "bold 9px system-ui, -apple-system, sans-serif";
                } else if (segments > 20) {
                    ctx.font = "bold 11px system-ui, -apple-system, sans-serif";
                } else {
                    ctx.font = "bold 13px system-ui, -apple-system, sans-serif";
                }
                
                let mealText = visiblePool[i] || "";
                if(mealText.length > 20) mealText = mealText.substring(0, 17) + '...';
                
                ctx.fillText(mealText, radius - 15, 0);
                ctx.restore();
            }

            ctx.beginPath();
            ctx.arc(centerX, centerY, 24, 0, 2 * Math.PI);
            ctx.fillStyle = "#1e293b";
            ctx.fill();
            ctx.strokeStyle = "#ffffff";
            ctx.lineWidth = 3;
            ctx.stroke();
        }

        function toggleBlockDay(day) {
            if (blockedDays.includes(day)) {
                blockedDays = blockedDays.filter(d => d !== day);
            } else {
                blockedDays.push(day);
                delete schedule[day];
            }
            localStorage.setItem('dinnerBlockedDays', JSON.stringify(blockedDays));
            localStorage.setItem('dinnerSchedule', JSON.stringify(schedule));
            renderWeek();
        }

        function addCustomMeal() {
            const input = document.getElementById('newMealInput');
            if(!input) return;
            const newMeal = input.value.trim();
            if (newMeal && !meals.includes(newMeal)) {
                meals.push(newMeal);
                localStorage.setItem('dinnerMeals', JSON.stringify(meals));
                input.value = '';
                renderMealList();
            }
        }

        function deleteMeal(index) {
            meals.splice(index, 1);
            localStorage.setItem('dinnerMeals', JSON.stringify(meals));
            renderMealList();
        }

        async function spinTheWeek() {
            const openDays = days.filter(day => !blockedDays.includes(day));

            let availablePool = [...meals];
            if (preventRepeats) {
                availablePool = meals.filter(m => !previousWeekMeals.includes(m));
            }

            if (availablePool.length < openDays.length) {
                availablePool = [...meals];
            }

            isSpinning = true;
            document.querySelectorAll('button').forEach(b => b.disabled = true);
            document.getElementById('wheelModal').style.display = 'flex';
            
            schedule = {}; 

            for (let i = 0; i < openDays.length; i++) {
                const currentDay = openDays[i];
                document.getElementById('modalStatus').innerText = `Selecting for ${currentDay}...`;
                
                const selectedMeal = await animateSingleSpin(availablePool);
                
                schedule[currentDay] = selectedMeal;
                localStorage.setItem('dinnerSchedule', JSON.stringify(schedule));
                renderWeek();

                availablePool = availablePool.filter(m => m !== selectedMeal);
                await new Promise(resolve => setTimeout(resolve, 800));
            }

            document.getElementById('modalStatus').innerText = "🎉 Week Drafted!";
            document.getElementById('modalLiveSelection').innerText = "Enjoy your meals!";
            
            setTimeout(() => {
                document.getElementById('wheelModal').style.display = 'none';
                isSpinning = false;
                document.querySelectorAll('button').forEach(b => b.disabled = false);
                renderMealList();
                renderWeek();
            }, 1500);
        }

        async function rerollSingleDay(day) {
            const activeWeekMeals = Object.keys(schedule)
                .filter(k => k !== day)
                .map(k => schedule[k]);

            let exclusiveAvailablePool = meals.filter(m => !activeWeekMeals.includes(m));

            if (preventRepeats) {
                exclusiveAvailablePool = exclusiveAvailablePool.filter(m => !previousWeekMeals.includes(m));
            }

            if (exclusiveAvailablePool.length < 1) {
                exclusiveAvailablePool = meals.filter(m => !activeWeekMeals.includes(m));
            }

            if (exclusiveAvailablePool.length < 1) {
                alert("No unique meals remaining to swap with! Add more meals first.");
                return;
            }
            
            isSpinning = true;
            document.querySelectorAll('button').forEach(b => b.disabled = true);
            document.getElementById('wheelModal').style.display = 'flex';
            
            document.getElementById('modalStatus').innerText = `Spinning ${day}...`;
            
            const selectedMeal = await animateSingleSpin(exclusiveAvailablePool);
            
            schedule[day] = selectedMeal;
            localStorage.setItem('dinnerSchedule', JSON.stringify(schedule));
            renderWeek();
            
            document.getElementById('modalStatus').innerText = "🎯 Choice Updated!";
            document.getElementById('modalLiveSelection').innerText = `${day} is now ${selectedMeal}!`;
            
            setTimeout(() => {
                document.getElementById('wheelModal').style.display = 'none';
                isSpinning = false;
                document.querySelectorAll('button').forEach(b => b.disabled = false);
                renderWeek();
            }, 1500);
        }

        function animateSingleSpin(currentPool) {
            return new Promise((resolve) => {
                const spinDuration = 2400; 
                const startTime = performance.now();
                
                let wheelPool = [...currentPool];
                const segments = wheelPool.length;
                const arcSize = (2 * Math.PI) / segments;

                const winningIndex = Math.floor(Math.random() * segments);
                const winningMeal = wheelPool[winningIndex];

                const targetSliceCenterAngle = (winningIndex * arcSize) + (arcSize / 2);
                const destinationStopAngle = (Math.PI * 2) - targetSliceCenterAngle - (Math.PI / 2);
                
                const fullRoundsMultiplier = (Math.floor(Math.random() * 2) + 4) * Math.PI * 2;
                const totalRotationTarget = fullRoundsMultiplier + destinationStopAngle;
                
                const normalizedStartAngle = currentAngle % (Math.PI * 2);

                function updateAnimation(now) {
                    const elapsed = now - startTime;
                    const progress = Math.min(elapsed / spinDuration, 1);
                    
                    const easeOut = 1 - Math.pow(1 - progress, 4);
                    currentAngle = normalizedStartAngle + (totalRotationTarget - normalizedStartAngle) * easeOut;
                    
                    drawPopUpWheel(wheelPool);

                    let rawPointingAngle = (-Math.PI / 2) - currentAngle;
                    while (rawPointingAngle < 0) rawPointingAngle += Math.PI * 2;
                    let liveWedgeIndex = Math.floor((rawPointingAngle % (Math.PI * 2)) / arcSize) % segments;
                    let currentPassingText = wheelPool[liveWedgeIndex] || "...";

                    if (progress < 0.85) {
                        document.getElementById('modalLiveSelection').innerText = `🎰 Passing: ${currentPassingText}`;
                        requestAnimationFrame(updateAnimation);
                    } else if (progress < 1) {
                        document.getElementById('modalLiveSelection').innerText = `🎯 Ticking... ${currentPassingText}`;
                        requestAnimationFrame(updateAnimation);
                    } else {
                        document.getElementById('modalLiveSelection').innerText = `✅ Chosen: ${winningMeal}!`;
                        resolve(winningMeal);
                    }
                }
                requestAnimationFrame(updateAnimation);
            });
        }

        function clearWeek() {
            if (isSpinning) return;
            schedule = {};
            blockedDays = [];
            localStorage.removeItem('dinnerSchedule');
            localStorage.removeItem('dinnerBlockedDays');
            renderWeek();
        }

        window.onload = init;
    </script>
</body>
