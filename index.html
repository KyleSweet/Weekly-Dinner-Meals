<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Dinner Spinner</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { margin-bottom: 20px; color: var(--primary); text-align: center; }

        .container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            max-width: 1100px;
            width: 100%;
        }

        @media (min-width: 768px) {
            .container { grid-template-columns: 2fr 1fr; }
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        /* Week Planner Styles */
        .day-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 0;
            border-bottom: 1px solid var(--border);
            gap: 10px;
        }
        .day-name { font-weight: 600; width: 100px; }
        .meal-assigned { flex-grow: 1; margin: 0 5px; color: #64748b; font-weight: 500; font-size: 1.05rem; }
        
        .action-btns {
            display: flex;
            gap: 8px;
        }
        
        .eat-out-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .eat-out-btn.blocked { background: #94a3b8; }
        
        .reroll-btn {
            background: #f59e0b;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .reroll-btn:hover { background: #d97706; }

        /* Controls */
        .actions {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 1100px;
        }
        button.main-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 24px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            flex-grow: 1;
        }
        button.main-btn:hover { background: var(--primary-hover); }
        button:disabled { opacity: 0.5; cursor: not-allowed !important; }

        /* Meal Manager */
        .meal-input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }
        input[type="text"] {
            flex-grow: 1;
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
        }
        .add-btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
        }
        .meal-list {
            max-height: 450px;
            overflow-y: auto;
            font-size: 0.9rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 5px;
        }
        .meal-item {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            border-bottom: 1px solid var(--border);
        }
        .delete-meal {
            color: #ef4444;
            cursor: pointer;
            background: none;
            border: none;
            font-weight: bold;
        }

        /* Pop-up Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 95%;
            max-width: 460px;
            position: relative;
        }

        #modalStatus {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 10px;
            text-align: center;
        }

        #modalLiveSelection {
            font-size: 1.3rem;
            font-weight: 700;
            background: #f1f5f9;
            padding: 12px;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 2px solid var(--border);
            min-height: 30px;
            color: #334155;
        }

        .wheel-container {
            position: relative;
            width: 400px;
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #wheelCanvas {
            border-radius: 50%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .wheel-pointer {
            position: absolute;
            top: -15px;
            left: calc(50% - 15px);
            width: 0; 
            height: 0; 
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #1e293b;
            z-index: 1100;
            filter: drop-shadow(0px 4px 4px rgba(0,0,0,0.2));
        }
    </style>
</head>
<body>

    <h1>Weekly Dinner Wheel Spinner</h1>

    <div class="actions">
        <button class="main-btn" id="spinBtn" onclick="spinTheWeek()">🎲 Spin the Week!</button>
        <button class="main-btn" style="background:#64748b;" onclick="clearWeek()">Reset Week</button>
    </div>

    <div class="container">
        <!-- Main Weekly Planner -->
        <div class="card">
            <h3>Your Week Layout</h3>
            <div id="weekPlanner"></div>
        </div>

        <!-- Meal List Manager -->
        <div class="card">
            <h3>Manage Meals (<span id="mealCount">0</span>)</h3>
            <div class="meal-input-group">
                <input type="text" id="newMealInput" placeholder="Add a dinner choice...">
                <button class="add-btn" onclick="addCustomMeal()">Add</button>
            </div>
            <div class="meal-list" id="mealListContainer"></div>
        </div>
    </div>

    <!-- The Giant Pop-up Wheel Screen -->
    <div class="modal-overlay" id="wheelModal">
        <div class="modal-content">
            <div id="modalStatus">Spinning...</div>
            <div id="modalLiveSelection">- - -</div>
            <div class="wheel-container">
                <div class="wheel-pointer"></div>
                <canvas id="wheelCanvas" width="400" height="400"></canvas>
            </div>
        </div>
    </div>

    <script>
        // YOUR EXPLICIT DEFAULT DINNER OPTIONS
        const defaultMeals = [
            "Sesame Chicken", "Carbonara", "Tacos", "Beef Short Ribs", "Breakfast", 
            "Spaghetti & Meatballs", "Sausage & Peppers", "Hamburgers", "Chicken Caesar Salad", 
            "Fried Chicken Sandwich", "Beef Stir Fry", "Butter Chicken", "Meatball Subs", 
            "Fajitas", "Quesadilla", "Grilled Cheese Sandwich", "Pulled Pork", "Poutine", 
            "Greek", "Bolognese", "Beef & Broccoli", "Sausage on a Bun", "Chili", 
            "Perogies", "Chicken Stir Fry", "Chicken Fried Rice", "Mac & Cheese", "Stew", 
            "Ham", "Chicken Wings", "Pork Tenderloin", "Chicken Parm", "Sloppy Joe", 
            "Chicken Tenders", "Chicken Teriyaki", "Burritos", "Chicken & Dumplings", 
            "Shrimp & Grits", "Tri Tip Sandwich", "Chicken Dumplets", "Turkey Breast"
        ];

        const days = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];
        
        let meals = JSON.parse(localStorage.getItem('dinnerMeals')) || defaultMeals;
        let schedule = JSON.parse(localStorage.getItem('dinnerSchedule')) || {};
        let blockedDays = JSON.parse(localStorage.getItem('dinnerBlockedDays')) || [];

        let currentAngle = 0;
        let isSpinning = false;
        
        const colors = ["#f87171", "#fb923c", "#fbbf24", "#34d399", "#22d3ee", "#60a5fa", "#818cf8", "#c084fc", "#f472b6", "#a7f3d0", "#fed7aa", "#c7d2fe"];

        function init() {
            // Force reset to the brand new custom default list if they haven't modified it yet
            if(!localStorage.getItem('dinnerMeals')) {
                localStorage.setItem('dinnerMeals', JSON.stringify(meals));
            }
            renderWeek();
            renderMealList();
        }

        function renderWeek() {
            const planner = document.getElementById('weekPlanner');
            if(!planner) return;
            planner.innerHTML = '';

            days.forEach(day => {
                const isBlocked = blockedDays.includes(day);
                const hasMeal = !!schedule[day];
                let currentMeal = schedule[day] || "Waiting for spin...";
                if (isBlocked) currentMeal = "🚫 Eating Out / Blocked";

                const row = document.createElement('div');
                row.className = 'day-row';
                
                // Only display the Re-roll option if a meal has actually been picked and the day isn't blocked
                const rerollButtonHtml = (hasMeal && !isBlocked) 
                    ? `<button class="reroll-btn" ${isSpinning ? 'disabled' : ''} onclick="rerollSingleDay('${day}')">🎲 Reroll</button>` 
                    : '';

                row.innerHTML = `
                    <div class="day-name">${day}</div>
                    <div class="meal-assigned" style="${isBlocked ? 'color: #ef4444; font-style: italic;' : schedule[day] ? 'color: #1e293b; font-weight:600;' : 'color: #94a3b8;'}">${currentMeal}</div>
                    <div class="action-btns">
                        ${rerollButtonHtml}
                        <button class="eat-out-btn ${isBlocked ? 'blocked' : ''}" ${isSpinning ? 'disabled' : ''} onclick="toggleBlockDay('${day}')">
                            ${isBlocked ? 'Unblock' : 'Eat Out'}
                        </button>
                    </div>
                `;
                planner.appendChild(row);
            });
        }

        function renderMealList() {
            const countEl = document.getElementById('mealCount');
            const container = document.getElementById('mealListContainer');
            if(!container || !countEl) return;

            countEl.innerText = meals.length;
            container.innerHTML = '';
            
            meals.forEach((meal, index) => {
                const item = document.createElement('div');
                item.className = 'meal-item';
                item.innerHTML = `
                    <span>${meal}</span>
                    <button class="delete-meal" ${isSpinning ? 'disabled' : ''} onclick="deleteMeal(${index})">✕</button>
                `;
                container.appendChild(item);
            });
        }

        function drawPopUpWheel(visiblePool) {
            const canvas = document.getElementById('wheelCanvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = centerX - 10;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const segments = Math.min(12, visiblePool.length); 
            const arcSize = (2 * Math.PI) / segments;

            for (let i = 0; i < segments; i++) {
                const angle = currentAngle + (i * arcSize);
                
                ctx.fillStyle = colors[i % colors.length];
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, angle, angle + arcSize);
                ctx.lineTo(centerX, centerY);
                ctx.fill();
                
                ctx.strokeStyle = "#ffffff";
                ctx.lineWidth = 2;
                ctx.stroke();
            }

            for (let i = 0; i < segments; i++) {
                const angle = currentAngle + (i * arcSize);
                
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(angle + (arcSize / 2));
                
                ctx.textAlign = "right";
                ctx.textBaseline = "middle";
                ctx.fillStyle = "#1e293b";
                ctx.font = "bold 13px system-ui, -apple-system, sans-serif";
                
                let mealText = visiblePool[i] || "";
                if(mealText.length > 18) mealText = mealText.substring(0, 15) + '...';
                
                ctx.fillText(mealText, radius - 15, 0);
                ctx.restore();
            }

            ctx.beginPath();
            ctx.arc(centerX, centerY, 24, 0, 2 * Math.PI);
            ctx.fillStyle = "#1e293b";
            ctx.fill();
            ctx.strokeStyle = "#ffffff";
            ctx.lineWidth = 3;
            ctx.stroke();
        }

        function toggleBlockDay(day) {
            if (blockedDays.includes(day)) {
                blockedDays = blockedDays.filter(d => d !== day);
            } else {
                blockedDays.push(day);
                delete schedule[day];
            }
            localStorage.setItem('dinnerBlockedDays', JSON.stringify(blockedDays));
            localStorage.setItem('dinnerSchedule', JSON.stringify(schedule));
            renderWeek();
        }

        function addCustomMeal() {
            const input = document.getElementById('newMealInput');
            if(!input) return;
            const newMeal = input.value.trim();
            if (newMeal && !meals.includes(newMeal)) {
                meals.push(newMeal);
                localStorage.setItem('dinnerMeals', JSON.stringify(meals));
                input.value = '';
                renderMealList();
            }
        }

        function deleteMeal(index) {
            meals.splice(index, 1);
            localStorage.setItem('dinnerMeals', JSON.stringify(meals));
            renderMealList();
        }

        // FULL WEEK SPINNER SEQUENCE
        async function spinTheWeek() {
            const openDays = days.filter(day => !blockedDays.includes(day));
            if (meals.length < openDays.length) {
                alert("Please make sure you have more meals in your list than open days left!");
                return;
            }

            isSpinning = true;
            document.querySelectorAll('button').forEach(b => b.disabled = true);
            document.getElementById('wheelModal').style.display = 'flex';
            
            let localPool = [...meals];

            for (let i = 0; i < openDays.length; i++) {
                const currentDay = openDays[i];
                document.getElementById('modalStatus').innerText = `Selecting for ${currentDay}...`;
                
                const selectedMeal = await animateSingleSpin(localPool);
                
                schedule[currentDay] = selectedMeal;
                localStorage.setItem('dinnerSchedule', JSON.stringify(schedule));
                renderWeek();

                localPool = localPool.filter(m => m !== selectedMeal);
                await new Promise(resolve => setTimeout(resolve, 1000));
            }

            document.getElementById('modalStatus').innerText = "🎉 Week Drafted!";
            document.getElementById('modalLiveSelection').innerText = "Enjoy your meals!";
            
            setTimeout(() => {
                document.getElementById('wheelModal').style.display = 'none';
                isSpinning = false;
                renderWeek(); // Re-enables custom row layout configurations correctly
            }, 1500);
        }

        // --- NEW INDIVIDUAL DAY RE-ROLL FUNCTION ---
        async function rerollSingleDay(day) {
            if (meals.length < 1) return;
            
            isSpinning = true;
            document.querySelectorAll('button').forEach(b => b.disabled = true);
            document.getElementById('wheelModal').style.display = 'flex';
            
            document.getElementById('modalStatus').innerText = `Re-rolling ${day}...`;
            
            // Allow selecting any dinner choice from the list for the single swap
            const selectedMeal = await animateSingleSpin([...meals]);
            
            schedule[day] = selectedMeal;
            localStorage.setItem('dinnerSchedule', JSON.stringify(schedule));
            renderWeek();
            
            document.getElementById('modalStatus').innerText = "🎯 Choice Updated!";
            document.getElementById('modalLiveSelection').innerText = `${day} is now ${selectedMeal}!`;
            
            setTimeout(() => {
                document.getElementById('wheelModal').style.display = 'none';
                isSpinning = false;
                renderWeek();
            }, 1500);
        }

        function animateSingleSpin(currentPool) {
            return new Promise((resolve) => {
                const spinDuration = 2400; 
                const startTime = performance.now();
                
                let wheelPool = [...currentPool].sort(() => 0.5 - Math.random()).slice(0, 12);
                const segments = wheelPool.length;
                const arcSize = (2 * Math.PI) / segments;

                const winningIndex = Math.floor(Math.random() * segments);
                const winningMeal = wheelPool[winningIndex];

                const targetSliceCenterAngle = (winningIndex * arcSize) + (arcSize / 2);
                const destinationStopAngle = (Math.PI * 2) - targetSliceCenterAngle - (Math.PI / 2);
                
                const fullRoundsMultiplier = (Math.floor(Math.random() * 2) + 4) * Math.PI * 2;
                const totalRotationTarget = fullRoundsMultiplier + destinationStopAngle;
                
                const normalizedStartAngle = currentAngle % (Math.PI * 2);

                function updateAnimation(now) {
                    const elapsed = now - startTime;
                    const progress = Math.min(elapsed / spinDuration, 1);
                    
                    const easeOut = 1 - Math.pow(1 - progress, 4);
                    currentAngle = normalizedStartAngle + (totalRotationTarget - normalizedStartAngle) * easeOut;
                    
                    drawPopUpWheel(wheelPool);

                    let rawPointingAngle = (-Math.PI / 2) - currentAngle;
                    while (rawPointingAngle < 0) rawPointingAngle += Math.PI * 2;
                    let liveWedgeIndex = Math.floor((rawPointingAngle % (Math.PI * 2)) / arcSize) % segments;
                    let currentPassingText = wheelPool[liveWedgeIndex] || "...";

                    if (progress < 0.85) {
                        document.getElementById('modalLiveSelection').innerText = `🎰 Passing: ${currentPassingText}`;
                        requestAnimationFrame(updateAnimation);
                    } else if (progress < 1) {
                        document.getElementById('modalLiveSelection').innerText = `🎯 Ticking... ${currentPassingText}`;
                        requestAnimationFrame(updateAnimation);
                    } else {
                        document.getElementById('modalLiveSelection').innerText = `✅ Chosen: ${winningMeal}!`;
                        resolve(winningMeal);
                    }
                }
                requestAnimationFrame(updateAnimation);
            });
        }

        function clearWeek() {
            if (isSpinning) return;
            schedule = {};
            localStorage.removeItem('dinnerSchedule');
            renderWeek();
        }

        // Quick check to force use of the fresh list if the user's browser is holding onto old defaults
        if (JSON.stringify(meals) !== JSON.stringify(defaultMeals) && localStorage.getItem('dinnerMeals') === null) {
            meals = defaultMeals;
            localStorage.setItem('dinnerMeals', JSON.stringify(meals));
        }

        window.onload = init;
    </script>
</body>
</html>
